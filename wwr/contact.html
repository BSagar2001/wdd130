<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact Us - RiverRush Rafting Co</title>

    <meta name="description"
      content="Contact RiverRush Rafting Co for reservations, rafting information, website suggestions, and general inquiries.">

    <meta name="author" content="Sagar Bhandari">

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <nav>
            <img src="images/logo.jpg" alt="RiverRush Rafting Logo">

            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <h1>Contact Us - RiverRush Rafting Co</h1>

        <!-- ADDRESS -->
        <section class="contact-info">
            <h2>Address</h2>
            <p>123 River Adventure Road, Idaho Falls, ID 83401</p>
            <p>Phone: (208) 555-1234</p>
            <p>Email: info@riverrushrafting.com</p>
        </section>

        <!-- MAP + FORM SIDE BY SIDE -->
        <section class="contact-container">

            <!-- MAP -->
            <div class="map-box">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m16!1m12!1m3!1d92549.83946143088!2d-112.11557255195234!3d43.54023787339137!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!2m1!1s123%20East%20River%20Road%2C%20Idaho%20Falls%2C%20ID%2083401%2C%20USA!5e0!3m2!1sen!2sin!4v1780475563142!5m2!1sen!2sin"
                  width="400" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade" width="100%" height="300"
                  loading="lazy">
                </iframe>
            </div>

            <!-- FORM -->
            <div class="form-box">

                <form>

                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>

                    <p><strong>Purpose of Message</strong></p>

                    <label>
                        <input type="radio" id="general" name="purpose" value="general">
                        General Inquiry
                    </label>

                    <label>
                        <input type="radio" id="reservation" name="purpose" value="reservation">
                        Reservation Question
                    </label>

                    <label>
                        <input type="radio" id="suggestion" name="purpose" value="suggestion">
                        Website Suggestion
                    </label>

                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5"></textarea>

                    <label for="newsletter">
                        <input type="checkbox" id="newsletter" name="newsletter">
                        Please subscribe me to the monthly newsletter
                    </label>

                    <button type="submit">Send Message</button>

                </form>
            </div>

        </section>

        <!-- HEADER LINE -->
        <div class="serve-header">
            <h2>We are here to serve you</h2>
        </div>

        <!-- EMPLOYEES -->
        <section class="employees">

            <figure>
                <img src="images/employee1.jpg" alt="Lead Guide">
                <figcaption>Sarah Johnson - Lead Guide</figcaption>
            </figure>

            <figure>
                <img src="images/employee2.jpg" alt="Manager">
                <figcaption>Michael Roberts - Manager</figcaption>
            </figure>

            <figure>
                <img src="images/employee3.jpg" alt="Support">
                <figcaption>Emily Davis - Support</figcaption>
            </figure>

        </section>

    </main>

    <footer>
        <p>©2026 RiverRush Rafting Co | Sagar Bhandari</p>

        <nav class="socialmedia">
            <a href="#"><img src="images/facebook_725289.png" alt="Facebook"></a>
            <a href="#"><img src="images/linkedin_725337.png" alt="LinkedIn"></a>
            <a href="#"><img src="images/instagram_725278.png" alt="Instagram"></a>
        </nav>
    </footer>

</body>

</html>
